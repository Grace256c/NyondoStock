<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<link rel="stylesheet" href="../static/css/login.css">
<!-- Tailwind CDN (for now, since we're skipping virtual env) -->
<script src="https://cdn.tailwindcss.com"></script>

<body>
    <div class="min-h-screen flex items-center justify-center" style="background-color: #272343;">
        <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">

            <!-- Logo -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full mb-3"
                    style="background-color: #f96d00;">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 22V12h6v10" />
                    </svg>
                </div>
                <h1 class="text-2xl font-bold" style="color: #272343;">Nyondo Hardware</h1>
                <p class="text-sm mt-1" style="color: #f96d00;">Management System</p>
            </div>

            <!-- Form -->
            <form method="POST">
                
                <div class="mb-5">
                    <label class="block font-medium mb-1" style="color: #272343;">Username</label>
                    <input type="text" name="username" placeholder="Enter your username"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none"
                        style="focus-border-color: #f96d00;" required>
                </div>

                <div class="mb-6">
                    <label class="block font-medium mb-1" style="color: #272343;">Password</label>
                    <input type="password" name="password" placeholder="Enter your password"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none" required>
                </div>

                <button type="submit" class="w-full text-white py-2 rounded-lg font-semibold transition duration-200"
                    style="background-color: #f96d00;" onmouseover="this.style.backgroundColor='#d95e00'"
                    onmouseout="this.style.backgroundColor='#f96d00'">
                    Login
                </button>

            </form>

        </div>
    </div>
</body>

</html>
